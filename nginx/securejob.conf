# Nginx configuration for SecureAJob Platform
# HTTPS with self-signed certificate + reverse proxy + DDoS protection

# ─── Rate Limiting Zones ──────────────────────────────────────────────────────
# General API: 20 requests/sec per IP (burst 40)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
# Auth endpoints: 5 requests/sec per IP (stricter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name localhost;

    # Connection limits
    limit_conn conn_limit 50;

    # ─── SSL Configuration ───────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/securejob/securejob.crt;
    ssl_certificate_key /etc/ssl/securejob/securejob.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Global Security Headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Hide server version
    server_tokens off;

    # ─── Body Size Limits ────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ─── Frontend (React) ────────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Auth Endpoints (Strict Rate Limit) ──────────────────────────────────
    location ~ ^/api/accounts/(register|login|resend-otp|verify-otp) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running auth ops
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ─── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ─── FastAPI docs (restricted with rate limit) ───────────────────────────
    location /docs {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ─── Block common attack paths ───────────────────────────────────────────
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }
}
